<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
	<head>
		{{ partial "head.html" . }}
	</head>
	<body>
		<header>
			{{ partial "header.html" . }}
		</header>
		<main>
			{{ block "main" . }}{{ end }}
		</main>
		<footer>
			{{ partial "footer.html" . }}
		</footer>
		{{- if .Store.Get "hasMermaid" }}
			{{ partial "mermaid.html" . }}
		{{- end }}
	</body>
</html>
