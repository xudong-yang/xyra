{{- $image := .Get "image" -}}
{{- $name  := .Get "name" -}}
{{- $link  := .Get "link" -}}

<figure class="badge-item">
  {{- if $link }}
    <a href="{{ $link }}" target="_blank" rel="noopener noreferrer">
      <img src="{{ $image }}" alt="{{ $name }}" loading="lazy">
    </a>
  {{- else }}
    <img src="{{ $image }}" alt="{{ $name }}" loading="lazy">
  {{- end }}
</figure>
